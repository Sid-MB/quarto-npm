name: Release

# Single publishing workflow (npm Trusted Publishing is bound to this file's
# name, so all publishes must originate here). It handles two release channels:
#
#   1. Quarto tracking (weekly schedule / manual): if upstream shipped a newer
#      Quarto, sync-version.js bumps package.json to match and commits it; that
#      new base `X.Y.Z` is then published as a stable release.
#   2. Wrapper patches (push to main touching wrapper code): plan-release.js
#      publishes the next prerelease `X.Y.Z-wrapper-patch.N` for the current
#      Quarto version, so wrapper-only fixes ship immediately without waiting on
#      a Quarto release. N is derived from the registry, so nothing is committed
#      back for a wrapper patch (no trigger loop).
#
# plan-release.js is the single decision point: it picks stable vs wrapper (or
# "nothing to do") and writes the version into package.json for `npm publish`.
# npm versions are immutable, so it also guards against re-publishing.
on:
  push:
    branches: [main]
    # Only wrapper code changes warrant a new patch; doc-only pushes are ignored.
    # (The weekly base bump is committed via GITHUB_TOKEN, which never re-triggers
    # a workflow, so its package.json change can't loop back through here.)
    paths:
      - "bin/**"
      - "lib/**"
      - "scripts/**"
      - "package.json"
  schedule:
    # Mondays at 07:00 UTC.
    - cron: "0 7 * * 1"
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write # commit + push the version bump and tag
  id-token: write # OIDC trusted publishing to npm (no stored token)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; Node 20 ships an older npm.
      - name: Update npm
        run: npm install -g npm@latest

      # Only the scheduled/manual runs look upstream for a newer Quarto release.
      # A push already carries whatever version the committer set.
      - name: Check for a newer Quarto release
        if: github.event_name != 'push'
        id: sync
        run: node scripts/sync-version.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push the version bump
        if: github.event_name != 'push' && steps.sync.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: update Quarto to ${{ steps.sync.outputs.version }}"
          git push

      # Decide the version to publish (stable base vs. next wrapper prerelease)
      # and write it into package.json. Emits publish=<true|false>, version, mode.
      - name: Plan release
        id: plan
        run: node scripts/plan-release.js
        env:
          EVENT_NAME: ${{ github.event_name }}
          SYNC_UPDATED: ${{ steps.sync.outputs.updated }}

      # No NODE_AUTH_TOKEN: npm exchanges the GitHub OIDC token for a one-time
      # publish credential and attaches provenance automatically. `--tag latest`
      # makes even a wrapper prerelease the default `npx @lillies/quarto` install.
      - name: Publish to npm
        if: steps.plan.outputs.publish == 'true'
        run: npm publish --tag latest

      - name: Tag the release
        if: steps.plan.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.plan.outputs.version }}"
          # Non-fatal: the tag may already exist from an earlier run.
          git tag "$TAG" && git push origin "$TAG" || echo "tag $TAG already exists; skipping."
