name: Update Quarto

# Weekly check for a new Quarto release. When upstream ships a newer version,
# bump package.json to match, commit + tag it, and publish to npm. The package
# version always mirrors the Quarto version it distributes.
on:
  schedule:
    # Mondays at 07:00 UTC.
    - cron: "0 7 * * 1"
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write # commit + push the version bump and tag
  id-token: write # OIDC trusted publishing to npm (no stored token)

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; Node 20 ships an older npm.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Check for a newer Quarto release
        id: sync
        run: node scripts/sync-version.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit, tag, and push
        if: steps.sync.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: update Quarto to ${{ steps.sync.outputs.version }}"
          git tag "v${{ steps.sync.outputs.version }}"
          git push --follow-tags

      # No NODE_AUTH_TOKEN: npm exchanges the GitHub OIDC token for a one-time
      # publish credential and attaches provenance automatically.
      - name: Publish to npm
        if: steps.sync.outputs.updated == 'true'
        run: npm publish
